<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croatian M&amp;A Vocabulary Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --gold: #C9963A;
    --gold-light: #E8B96A;
    --gold-dim: rgba(201,150,58,0.13);
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #4a5260;
    --correct: #2ea043;
    --correct-bg: rgba(46,160,67,0.12);
    --correct-border: rgba(46,160,67,0.4);
    --wrong: #da3633;
    --wrong-bg: rgba(218,54,51,0.10);
    --wrong-border: rgba(218,54,51,0.35);
    --reveal: rgba(46,160,67,0.08);
    --blue: #79b8ff;
    --blue-dim: rgba(100,180,255,0.08);
    --blue-border: rgba(100,180,255,0.35);
    --radius: 8px;
    --radius-lg: 12px;
  }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2.5rem 1rem 5rem;
  }
  .shell { width: 100%; max-width: 660px; }

  .quiz-title-block {
    text-align: center; margin-bottom: 2.5rem; padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .quiz-title {
    font-size: 28px; font-weight: bold; color: var(--text);
    letter-spacing: 0.01em; line-height: 1.2; margin-bottom: 0.4rem;
  }
  .quiz-subtitle {
    font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text-dim); letter-spacing: 0.06em;
  }

  /* ── Header ── */
  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2.25rem;
  }
  .hdr-left { display: flex; align-items: center; gap: 12px; }
  .hdr-emblem {
    width: 36px; height: 36px; flex-shrink: 0;
  }
  .hdr-titles { display: flex; flex-direction: column; gap: 2px; }
  .hdr-title {
    font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
    line-height: 1;
  }
  .hdr-sub {
    font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text-dim); letter-spacing: 0.04em;
  }
  .hdr-right { display: flex; align-items: center; gap: 14px; }
  .hdr-score {
    font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--text-muted);
  }
  .hdr-score span { color: var(--gold); font-weight: 600; }
  .streak-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text-dim);
    opacity: 0; transition: opacity 0.3s;
  }
  .streak-badge.show { opacity: 1; }
  .streak-badge.hot { color: #f78166; }
  .streak-num { font-weight: 600; font-size: 13px; }

  /* ── Dot progress ── */
  .progress-wrap { margin-bottom: 2.25rem; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.04em;
  }
  .dot-track {
    display: flex; gap: 4px; align-items: center;
  }
  .dot {
    height: 4px; flex: 1; border-radius: 2px;
    background: var(--border); transition: background 0.4s ease;
  }
  .dot.done { background: var(--gold); }
  .dot.correct-dot { background: var(--correct); }
  .dot.wrong-dot { background: var(--wrong); }
  .dot.current { background: var(--gold); opacity: 0.4; }

  /* ── Question card ── */
  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1rem;
    animation: fadeUp 0.32s cubic-bezier(.22,.68,0,1.2);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .q-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 4px;
    border: 1px solid var(--gold); color: var(--gold); background: var(--gold-dim);
  }
  .q-badge.wb-badge { border-color: var(--blue-border); color: var(--blue); background: var(--blue-dim); }
  .q-badge.oo-badge { border-color: rgba(46,160,67,0.45); color: #7ee787; background: rgba(46,160,67,0.08); }
  .q-badge.tf-badge { border-color: rgba(240,160,60,0.5); color: #e3a43a; background: rgba(240,160,60,0.08); }
  .q-badge.rp-badge { border-color: rgba(180,130,255,0.45); color: #c9a4f0; background: rgba(180,130,255,0.08); }
  .q-badge.cu-badge { border-color: rgba(255,120,160,0.4); color: #f0899e; background: rgba(255,120,160,0.07); }
  .q-badge svg { flex-shrink: 0; }
  .opt.sentence-opt { font-size: 13px; font-style: italic; line-height: 1.6; }
  .q-hint-wrap { display: flex; align-items: center; gap: 6px; }
  .q-hint-icon svg { display: block; }
  .q-hint {
    font-size: 12px; font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text-dim); letter-spacing: 0.04em;
  }

  .q-text { font-size: 15px; line-height: 1.8; color: var(--text); margin-bottom: 1.25rem; }

  /* ── MC options ── */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 0.9rem 1rem; cursor: pointer; font-size: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--text);
    line-height: 1.5; text-align: left;
    transition: border-color 0.15s, background 0.15s; width: 100%;
  }
  .opt:hover:not(.locked) { border-color: var(--border-hover); background: rgba(255,255,255,0.04); }
  .opt-letter {
    min-width: 22px; height: 22px; border-radius: 50%; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    flex-shrink: 0; margin-top: 1px; transition: background 0.15s, color 0.15s;
  }
  .opt.correct { border-color: var(--correct-border); background: var(--correct-bg); }
  .opt.correct .opt-letter { background: var(--correct); color: #fff; }
  .opt.wrong   { border-color: var(--wrong-border);   background: var(--wrong-bg); }
  .opt.wrong   .opt-letter { background: var(--wrong); color: #fff; }
  .opt.reveal  { border-color: var(--correct-border); background: var(--reveal); }
  .opt.reveal  .opt-letter { background: var(--correct); color: #fff; }
  .opt.locked  { cursor: default; }

  /* ── Word bank ── */
  .wb-label { font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 10px; }
  .blank-display {
    display: inline-block; min-width: 160px;
    border-bottom: 2px solid var(--gold); color: var(--gold-light);
    font-style: italic; padding: 0 6px 2px; vertical-align: bottom;
    font-size: 15px; transition: color 0.2s, border-color 0.2s;
  }
  .blank-display.empty { color: transparent; }
  .blank-display.correct-b { border-color: var(--correct); color: #7ee787; }
  .blank-display.wrong-b   { border-color: var(--wrong);   color: #ff8b8b; }
  .word-bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .wb-chip {
    background: var(--surface2); border: 1px solid var(--border-hover);
    border-radius: 6px; padding: 6px 14px; font-size: 13px;
    font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--text-muted);
    cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .wb-chip:hover:not(.used):not(.locked) { background: rgba(255,255,255,0.06); border-color: var(--gold); color: var(--gold-light); }
  .wb-chip.selected    { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }
  .wb-chip.locked      { cursor: default; }
  .wb-chip.chip-correct { background: var(--correct-bg); border-color: var(--correct-border); color: #7ee787; }
  .wb-chip.chip-wrong   { background: var(--wrong-bg);   border-color: var(--wrong-border);   color: #ff8b8b; }
  .wb-chip.chip-reveal  { background: var(--reveal);     border-color: var(--correct-border); color: #7ee787; }
  .wb-actions { display: flex; gap: 8px; }
  .wb-submit {
    background: var(--gold-dim); border: 1px solid var(--gold); border-radius: var(--radius);
    padding: 0.55rem 1.25rem; font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.06em; color: var(--gold-light); cursor: pointer; transition: background 0.15s;
  }
  .wb-submit:hover:not(:disabled) { background: rgba(201,150,58,0.22); }
  .wb-submit:disabled { opacity: 0.35; cursor: default; }
  .wb-clear {
    background: transparent; border: 1px solid var(--border-hover); border-radius: var(--radius);
    padding: 0.55rem 1rem; font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text-dim); cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .wb-clear:hover:not(:disabled) { color: var(--text-muted); }
  .wb-clear:disabled { opacity: 0.25; cursor: default; }

  /* ── Feedback ── */
  .feedback {
    margin-top: 1.25rem; border-radius: var(--radius); font-size: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.65;
    display: none; animation: fadeUp 0.25s ease; overflow: hidden;
  }
  .feedback.show { display: block; }
  .fb-header {
    display: flex; align-items: center; gap: 8px;
    padding: 0.75rem 1rem; font-weight: 600; font-size: 14px;
  }
  .feedback.fb-correct .fb-header { background: var(--correct-bg); border: 1px solid var(--correct-border); color: #7ee787; border-radius: var(--radius) var(--radius) 0 0; }
  .feedback.fb-wrong   .fb-header { background: var(--wrong-bg);   border: 1px solid var(--wrong-border);   color: #ff8b8b; border-radius: var(--radius) var(--radius) 0 0; }
  .fb-body {
    padding: 0.85rem 1rem; border-left: 1px solid; border-right: 1px solid; border-bottom: 1px solid;
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .feedback.fb-correct .fb-body { border-color: var(--correct-border); }
  .feedback.fb-wrong   .fb-body { border-color: var(--wrong-border); }
  .explain-text { color: var(--text-muted); font-size: 13px; line-height: 1.65; }

  /* ── Example ── */
  .q-example-wrap {
    margin-top: 1.25rem; padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: none; animation: fadeUp 0.3s ease;
  }
  .q-example-wrap.show { display: block; }
  .q-example-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 7px;
  }
  .q-example {
    font-size: 13.5px; font-family: Georgia, serif; font-style: italic;
    color: var(--text-muted); line-height: 1.7;
    padding-left: 14px; border-left: 2px solid var(--gold-dim);
  }

  /* ── Nav ── */
  .nav-row { display: flex; justify-content: flex-end; margin-top: 1rem; }
  .next-btn {
    background: transparent; border: 1px solid var(--border-hover); border-radius: var(--radius);
    padding: 0.6rem 1.5rem; font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.06em; color: var(--text-muted); cursor: pointer; display: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { border-color: var(--gold); color: var(--gold-light); }

  /* ── Results ── */
  .results { animation: fadeUp 0.4s ease; }
  .results-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 2.5rem 2rem; text-align: center;
  }
  .results-label {
    font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1.75rem;
  }
  .ring-wrap { position: relative; width: 140px; height: 140px; margin: 0 auto 1.5rem; }
  .ring-wrap svg { width: 140px; height: 140px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-fill  { fill: none; stroke: var(--gold); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); }
  .ring-text  {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-score { font-size: 36px; font-weight: bold; color: var(--gold); line-height: 1; }
  .ring-denom { font-size: 13px; color: var(--text-dim); font-family: 'Helvetica Neue', Arial, sans-serif; margin-top: 2px; }
  .results-msg { font-size: 15px; color: var(--text); margin-bottom: 2rem; line-height: 1.6; }
  .results-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2rem; }
  .stat-cell {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem;
    display: flex; align-items: center; gap: 12px;
  }
  .stat-icon { flex-shrink: 0; }
  .stat-right { text-align: left; }
  .stat-num { font-size: 26px; font-weight: bold; line-height: 1; margin-bottom: 3px; }
  .stat-num.green { color: var(--correct); }
  .stat-num.red   { color: var(--wrong); }
  .stat-lbl { font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .review-list { text-align: left; margin-bottom: 2rem; }
  .review-heading {
    font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 0.75rem; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .review-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif;
    border-bottom: 1px solid var(--border);
  }
  .review-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .review-dot.ok  { background: var(--correct); }
  .review-dot.bad { background: var(--wrong); }
  .review-term { color: var(--text); flex: 1; }
  .review-cluster { font-size: 11px; color: var(--text-dim); margin-right: 6px; }
  .review-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border);
  }
  .review-tag.ok-tag  { color: var(--correct); border-color: var(--correct-border); background: var(--correct-bg); }
  .review-tag.bad-tag { color: var(--wrong);   border-color: var(--wrong-border);   background: var(--wrong-bg); }
  .btn-row { display: flex; gap: 10px; justify-content: center; }
  .restart-btn {
    background: transparent; border: 1px solid var(--border-hover); border-radius: var(--radius);
    padding: 0.65rem 1.5rem; font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.06em; color: var(--text-muted); cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .restart-btn:hover { border-color: var(--gold); color: var(--gold-light); }
</style>
</head>
<body>
<div class="shell">
  <div class="quiz-title-block">
    <div class="quiz-title">M&amp;A Vocabulary Quiz</div>
    <div class="quiz-subtitle">Croatian Joint Stock Company Takeover Act</div>
  </div>
  <div class="hdr">
    <div class="hdr-left">
      <svg class="hdr-emblem" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" stroke="#C9963A" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="18" y1="9" x2="18" y2="11" stroke="#C9963A" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.9"/>
        <line x1="18" y1="11" x2="11" y2="16" stroke="#C9963A" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.7"/>
        <line x1="18" y1="11" x2="25" y2="16" stroke="#C9963A" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.7"/>
        <rect x="9" y="16" width="8" height="5" rx="2.5" fill="#C9963A" fill-opacity="0.15" stroke="#C9963A" stroke-width="1" stroke-opacity="0.6"/>
        <rect x="19" y="16" width="8" height="5" rx="2.5" fill="#C9963A" fill-opacity="0.15" stroke="#C9963A" stroke-width="1" stroke-opacity="0.6"/>
        <line x1="10" y1="24" x2="26" y2="24" stroke="#C9963A" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.5"/>
        <line x1="18" y1="24" x2="18" y2="27" stroke="#C9963A" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.5"/>
      </svg>
      <div class="hdr-titles">
        <div class="hdr-title">M&amp;A Vocabulary</div>
        <div class="hdr-sub">Croatian Joint Stock Company Takeover Act · 15 terms</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="streak-badge" id="streakBadge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1C6 1 9 4 9 6.5C9 8.43 7.66 10 6 10C4.34 10 3 8.43 3 6.5C3 5 4.5 3.5 4.5 3.5C4.5 3.5 4.5 5 5.5 5.5C5.5 4 6 1 6 1Z" fill="#f78166"/></svg>
        <span class="streak-num" id="streakNum">0</span>
      </div>
      <div class="hdr-score" id="scoreDisp">Score: <span>0</span></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="qMeta">Question 1 of 15</span>
      <span id="pctMeta">0%</span>
    </div>
    <div class="dot-track" id="dotTrack"></div>
  </div>

  <div id="main"></div>
</div>

<script>
const ICONS = {
  'Key parties': `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="4.5" cy="4" r="2" stroke="#4a5260" stroke-width="1.2"/><circle cx="8.5" cy="4" r="2" stroke="#4a5260" stroke-width="1.2"/><path d="M1 11c0-2 1.6-3 3.5-3s3.5 1 3.5 3" stroke="#4a5260" stroke-width="1.2" stroke-linecap="round"/><path d="M8.5 8c1.2 0 2.5.8 2.5 2.5" stroke="#4a5260" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  'Offer mechanics': `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="2" y="1.5" width="9" height="10" rx="1.5" stroke="#4a5260" stroke-width="1.2"/><line x1="4.5" y1="5" x2="8.5" y2="5" stroke="#4a5260" stroke-width="1.2" stroke-linecap="round"/><line x1="4.5" y1="7.5" x2="8.5" y2="7.5" stroke="#4a5260" stroke-width="1.2" stroke-linecap="round"/><line x1="4.5" y1="9.5" x2="7" y2="9.5" stroke="#4a5260" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  'Thresholds &amp; calculations': `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="8" width="2.5" height="3.5" rx="0.5" fill="#4a5260"/><rect x="5.25" y="5" width="2.5" height="6.5" rx="0.5" fill="#4a5260"/><rect x="9" y="2" width="2.5" height="9.5" rx="0.5" fill="#4a5260"/></svg>`,
  'Bid obligations': `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.5L8 4.5H11L8.5 6.5L9.5 9.5L6.5 7.5L3.5 9.5L4.5 6.5L2 4.5H5L6.5 1.5Z" stroke="#4a5260" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
  'Pre-bid tactics': `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="3.5" stroke="#4a5260" stroke-width="1.2"/><line x1="8" y1="8" x2="11.5" y2="11.5" stroke="#4a5260" stroke-width="1.5" stroke-linecap="round"/></svg>`,

let cur = 0, score = 0, streak = 0, results = [], selectedChip = null;

function norm(s) { return s.trim().toLowerCase().replace(/[-\s]+/g,' '); }

function buildDots() {
  const t = document.getElementById('dotTrack');
  if (!t) return;
  t.innerHTML = Q.map((_,i) => `<div class="dot" id="d${i}"></div>`).join('');
}

function updateDot(idx, cls) {
  const d = document.getElementById('d'+idx);
  if (d) { d.className = 'dot ' + cls; }
}

function updateHdr() {
  const done = cur < Q.length ? cur : Q.length;
  document.getElementById('scoreDisp').innerHTML = 'Score: <span>' + score + ' / ' + done + '</span>';
  const pct = Math.round((cur / Q.length) * 100);
  document.getElementById('qMeta').textContent = cur < Q.length ? 'Question '+(cur+1)+' of '+Q.length : 'Complete';
  document.getElementById('pctMeta').textContent = pct + '%';
  const sb = document.getElementById('streakBadge');
  const sn = document.getElementById('streakNum');
  if (streak >= 2) {
    sb.classList.add('show');
    sb.classList.toggle('hot', streak >= 4);
    sn.textContent = streak;
  } else {
    sb.classList.remove('show');
  }
}

function render() {
  if (cur >= Q.length) { showResults(); return; }
  updateHdr();
  selectedChip = null;
  const q = Q[cur];
  const isWB = q.type === 'wb';
  const isCU = q.type === 'cu';
  const icon = ICONS[q.hint] || '';

  const BADGE = {
    mc: { cls:'',          icon:'<path d="M2 5.5L4.5 8L9 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>',  label:'Multiple choice' },
    wb: { cls:' wb-badge', icon:'<path d="M1 5.5H10M5.5 1V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>',                         label:'Word bank' },
    oo: { cls:' oo-badge', icon:'<circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/><line x1="3.5" y1="3.5" x2="7.5" y2="7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>',  label:'Odd one out' },
    tf: { cls:' tf-badge', icon:'<path d="M1.5 5.5L4 8L9.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>',  label:'True or false' },
    rp: { cls:' rp-badge', icon:'<circle cx="2.5" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="8.5" cy="5.5" r="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 5.5H7M6 4L7.5 5.5L6 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>',  label:'Relationship pair' },
    cu: { cls:' cu-badge', icon:'<path d="M2 3H9M2 5.5H7M2 8H8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>',                    label:'Correct usage' }
  };
  const b = BADGE[q.type] || BADGE.mc;

  let body = '';
  if (!isWB) {
    body = `<div class="options">${q.opts.map((o,i)=>`
      <button class="opt${isCU?' sentence-opt':''}" data-i="${i}" onclick="chooseOpt(${i})">
        <span class="opt-letter">${String.fromCharCode(65+i)}</span>
        <span>${o}</span>
      </button>`).join('')}</div>`;
  } else {
    const shuffled = [...q.bank].sort(()=>Math.random()-0.5);
    body = `
      <div class="wb-label">Word bank — select the correct term</div>
      <div class="word-bank" id="bank">
        ${shuffled.map(w=>`<button class="wb-chip" data-word="${w}" onclick="selectChip(this,'${w.replace(/'/g,"\\'")}')">
          ${w.charAt(0).toUpperCase()+w.slice(1)}
        </button>`).join('')}
      </div>
      <div class="wb-actions">
        <button class="wb-submit" id="wbsub" onclick="submitWB()" disabled>Confirm answer</button>
        <button class="wb-clear" id="wbclr" onclick="clearChip()" disabled>Clear</button>
      </div>`;
  }

  document.getElementById('main').innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-badge${b.cls}">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">${b.icon}</svg>
          ${b.label}
        </span>
        <div class="q-hint-wrap">
          <span class="q-hint-icon">${icon}</span>
          <span class="q-hint">${q.hint}</span>
        </div>
      </div>
      <div class="q-text">${q.q}</div>
      ${body}
      <div class="feedback" id="fb-box"></div>
      <div class="q-example-wrap" id="ex-wrap">
        <div class="q-example-label">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4C2 2.9 2.9 2 4 2H8C9.1 2 10 2.9 10 4V7C10 8.1 9.1 9 8 9H6.5L4.5 10.5V9H4C2.9 9 2 8.1 2 7V4Z" stroke="#4a5260" stroke-width="1.1"/></svg>
          Use it like this in a sentence:
        </div>
        <div class="q-example">${q.example}</div>
      </div>
    </div>
    <div class="nav-row">
      <button class="next-btn" id="nxt" onclick="advance()">${cur < Q.length-1 ? 'Next question &rarr;' : 'See results &rarr;'}</button>
    </div>`;

  updateDot(cur, 'current');
}

function selectChip(el, word) {
  if (el.classList.contains('locked')) return;
  document.querySelectorAll('.wb-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedChip = word;
  const blank = document.getElementById('blank');
  if (blank) { blank.textContent = word.charAt(0).toUpperCase()+word.slice(1); blank.classList.remove('empty'); }
  document.getElementById('wbsub').disabled = false;
  document.getElementById('wbclr').disabled = false;
}

function clearChip() {
  document.querySelectorAll('.wb-chip').forEach(c => c.classList.remove('selected'));
  selectedChip = null;
  const blank = document.getElementById('blank');
  if (blank) { blank.textContent = '___'; blank.classList.add('empty'); }
  document.getElementById('wbsub').disabled = true;
  document.getElementById('wbclr').disabled = true;
}

function submitWB() {
  if (!selectedChip) return;
  const q = Q[cur];
  const correct = norm(selectedChip) === norm(q.answer);
  lockWB(selectedChip, correct, q.answer);
  if (correct) { score++; streak++; } else { streak = 0; }
  results.push({ term: q.term, hint: q.hint, correct });
  document.getElementById('scoreDisp').innerHTML = 'Score: <span>' + score + ' / ' + (cur+1) + '</span>';
  showFeedback(correct, q);
  updateDot(cur, correct ? 'correct-dot' : 'wrong-dot');
  updateHdr();
}

function lockWB(chosen, correct, answer) {
  document.querySelectorAll('.wb-chip').forEach(c => {
    c.classList.add('locked'); c.onclick = null;
    const w = c.getAttribute('data-word');
    if (w === chosen && correct)  c.classList.add('chip-correct');
    else if (w === chosen)        c.classList.add('chip-wrong');
    else if (norm(w) === norm(answer) && !correct) c.classList.add('chip-reveal');
  });
  const blank = document.getElementById('blank');
  if (blank) { blank.classList.add(correct ? 'correct-b' : 'wrong-b'); blank.classList.remove('empty'); }
  document.getElementById('wbsub').disabled = true;
  document.getElementById('wbclr').disabled = true;
}

function chooseOpt(idx) {
  const opts = document.querySelectorAll('.opt');
  if (!opts.length) return;
  opts.forEach(o => { o.classList.add('locked'); o.onclick = null; });
  const q = Q[cur];
  const correct = idx === q.correct;
  if (correct) { opts[idx].classList.add('correct'); score++; streak++; }
  else { opts[idx].classList.add('wrong'); opts[q.correct].classList.add('reveal'); streak = 0; }
  results.push({ term: q.term, hint: q.hint, correct });
  document.getElementById('scoreDisp').innerHTML = 'Score: <span>' + score + ' / ' + (cur+1) + '</span>';
  showFeedback(correct, q);
  updateDot(cur, correct ? 'correct-dot' : 'wrong-dot');
  updateHdr();
}

function showFeedback(correct, q) {
  const fb = document.getElementById('fb-box');
  fb.className = 'feedback show ' + (correct ? 'fb-correct' : 'fb-wrong');
  const icon = correct
    ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#2ea043" stroke-width="1.2"/><path d="M5 8.5L7 10.5L11 6" stroke="#2ea043" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#da3633" stroke-width="1.2"/><path d="M5.5 5.5L10.5 10.5M10.5 5.5L5.5 10.5" stroke="#da3633" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  fb.innerHTML = `
    <div class="fb-header">${icon}${correct ? 'Correct.' : 'Incorrect.'}</div>
    <div class="fb-body"><div class="explain-text">${q.explain}</div></div>`;
  const ex = document.getElementById('ex-wrap');
  if (ex) ex.classList.add('show');
  document.getElementById('nxt').classList.add('show');
}

function advance() { cur++; render(); }

function showResults() {
  updateHdr();
  const pct = Math.round((score / Q.length) * 100);
  let msg;
  if (pct === 100) msg = 'Perfect score — every term, every nuance. You are ready for the deal room.';
  else if (pct >= 87) msg = 'Near-perfect. You have a confident command of this vocabulary — just a couple of terms to polish before you\'re deal-ready.';
  else if (pct >= 67) msg = 'Solid result. The core framework is clearly there. A focused review of the flagged terms will sharpen the edges.';
  else if (pct >= 47) msg = 'Good start — you know more than you think. Read through the explanations for the terms you missed and try again; the second attempt will look very different.';
  else msg = 'Every expert starts here. Work through the term list with the explanations, and retake the quiz — the vocabulary will stick faster than you expect.';

  const correct = results.filter(r=>r.correct).length;
  const wrong   = results.filter(r=>!r.correct).length;
  const bestStreak = results.reduce((acc,r,i,a)=>{
    let s=0; for(let j=i;j<a.length&&a[j].correct;j++) s++;
    return Math.max(acc,s);
  },0);

  const reviewHtml = results.map(r=>`
    <div class="review-item">
      <div class="review-dot ${r.correct?'ok':'bad'}"></div>
      <div class="review-term">${r.term}</div>
      <span class="review-cluster">${r.hint}</span>
      <div class="review-tag ${r.correct?'ok-tag':'bad-tag'}">${r.correct?'Correct':'Review'}</div>
    </div>`).join('');

  const circumference = 2 * Math.PI * 52;
  const offset = circumference - (pct / 100) * circumference;

  document.getElementById('main').innerHTML = `
    <div class="results">
      <div class="results-card">
        <div class="results-label">Quiz complete &mdash; 15 terms</div>
        <div class="ring-wrap">
          <svg viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="52"/>
            <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="52"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${circumference}"/>
          </svg>
          <div class="ring-text">
            <div class="ring-score">${score}</div>
            <div class="ring-denom">of ${Q.length}</div>
          </div>
        </div>
        <div class="results-msg">${msg}</div>
        <div class="results-breakdown">
          <div class="stat-cell">
            <div class="stat-icon">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#2ea043" stroke-width="1.2" stroke-opacity="0.4"/><path d="M9 14.5L12 17.5L19 11" stroke="#2ea043" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="stat-right">
              <div class="stat-num green">${correct}</div>
              <div class="stat-lbl">Correct</div>
            </div>
          </div>
          <div class="stat-cell">
            <div class="stat-icon">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#da3633" stroke-width="1.2" stroke-opacity="0.4"/><path d="M10 10L18 18M18 10L10 18" stroke="#da3633" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <div class="stat-right">
              <div class="stat-num red">${wrong}</div>
              <div class="stat-lbl">To review</div>
            </div>
          </div>
        </div>
        ${bestStreak >= 3 ? `<div style="text-align:center;margin-bottom:1.5rem;font-size:13px;font-family:'Helvetica Neue',Arial,sans-serif;color:var(--text-dim)">Best streak: <span style="color:#f78166;font-weight:600">${bestStreak} in a row</span></div>` : ''}
        <div class="review-list">
          <div class="review-heading">Term-by-term summary</div>
          ${reviewHtml}
        </div>
        <div class="btn-row">
          <button class="restart-btn" onclick="restart()">Restart quiz</button>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    const ring = document.getElementById('ringFill');
    if (ring) ring.style.strokeDashoffset = offset;
  }, 80);
}

function restart() { cur = 0; score = 0; streak = 0; results = []; selectedChip = null; buildDots(); render(); }

buildDots();
render();
</script>
</body>
</html>
